<!DOCTYPE html>
<html>
<head>
    <title>Лаба 6 - Задание 4</title>
</head>
<body>
    <!-- Здесь размещен оригинальный HTML из задания -->
    <form name="search">
        <label>Search the site:
            <input type="text" name="search">
        </label>
        <input type="submit" value="Search!">
    </form>

    <hr>

    <form name="search-person">
        Search the visitors:
        <table id="age-table">
            <tbody>
                <tr>
                    <td>Age:</td>
                    <td id="age-list">
                        <label>
                            <input type="radio" name="age" value="young">less than 18
                        </label>
                        <label>
                            <input type="radio" name="age" value="mature">18-50
                        </label>
                        <label>
                            <input type="radio" name="age" value="senior">more than 50
                        </label>
                    </td>
                </tr>
                <tr>
                    <td>Additionally:</td>
                    <td>
                        <input type="text" name="info[0]">
                        <input type="text" name="info[1]">
                        <input type="text" name="info[2]">
                    </td>
                </tr>
            </tbody>
        </table>
        <input type="submit" value="Search!">
    </form>

    <script>
        // 1. Таблица с id="age-table"
        let table = document.getElementById('age-table');
        console.log('1. Таблица:', table);

        // 2. Все элементы label внутри этой таблицы
        let labels = table.querySelectorAll('label');
        console.log('2. Элементы label внутри таблицы:', labels);
        console.log('   Количество label:', labels.length);

        // 3. Первый td в этой таблице (со словом «Age»)
        let firstTd = table.querySelector('td');
        console.log('3. Первый td:', firstTd);
        console.log('   Текст первого td:', firstTd.textContent);

        // 4. Форма form с именем name="search" (первая форма)
        let form = document.querySelector('form[name="search"]');
        console.log('4. Форма с именем "search":', form);

        // 5. Первый input в этой форме
        let firstInput = form.querySelector('input');
        console.log('5. Первый input в форме:', firstInput);
        console.log('   Атрибут name:', firstInput.name);
        console.log('   Тип:', firstInput.type);

        // 6. Последний input в этой форме
        let inputs = form.querySelectorAll('input');
        let lastInput = inputs[inputs.length - 1];
        console.log('6. Последний input в форме:', lastInput);
        console.log('   Значение:', lastInput.value); // "Search!"

        // Дополнительно: выведем результаты на страницу для наглядности
        document.write('<h3>Результаты выполнения задания:</h3>');
        document.write('<p><b>1.</b> Таблица найдена: ' + (table ? 'ДА' : 'НЕТ') + '</p>');
        document.write('<p><b>2.</b> Label внутри таблицы: ' + labels.length + ' шт.</p>');
        document.write('<p><b>3.</b> Первый td: "' + firstTd.textContent.trim() + '"</p>');
        document.write('<p><b>4.</b> Форма с именем "search": ' + (form ? 'НАЙДЕНА' : 'НЕ НАЙДЕНА') + '</p>');
        document.write('<p><b>5.</b> Первый input: type="' + firstInput.type + '", name="' + firstInput.name + '"</p>');
        document.write('<p><b>6.</b> Последний input: type="' + lastInput.type + '", value="' + lastInput.value + '"</p>');
    </script>
</body>
</html>
