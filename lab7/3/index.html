<!DOCTYPE html>
<html>
<head>
    <title>Лаба 7, Задание 3</title>
</head>
<body>
    <p>Кликните в любом месте страницы</p>
    <div id="coordDisplay" class="coord-box">Координаты появятся здесь</div>

    <script>
        let coordDisplay = document.getElementById('coordDisplay');
        
        document.addEventListener('click', function(event) {
            let x = event.clientX;
            let y = event.clientY;
            coordDisplay.innerHTML = `X = ${x}, Y = ${y}`;
        });
    </script>
</body>
</html>
